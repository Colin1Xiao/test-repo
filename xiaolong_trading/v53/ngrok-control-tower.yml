# ngrok 配置 - 小龙 Control Tower v3
# 使用: ngrok start --config=ngrok-control-tower.yml control-tower

version: "3"
agent:
  authtoken: YOUR_NGROK_AUTHTOKEN  # 替换为你的 ngrok token

tunnels:
  control-tower:
    proto: http
    addr: 8767
    # 使用固定域名（需要付费订阅）
    # domain: your-domain.ngrok.io
    # 或使用随机域名（免费）
    inspect: true
    # 基本认证（可选）
    # basic_auth:
    #   - username:password
