<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P1-3 图表增量更新测试</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0a0f19;
      color: #f5f7fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .status {
      text-align: center;
      color: #b6c1d1;
      margin-bottom: 30px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 18px;
    }
    .card h3 {
      margin: 0 0 14px;
      font-size: 15px;
      color: #b6c1d1;
    }
    .chart-container {
      position: relative;
      height: 250px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .metric {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .metric-label {
      color: #7f8a9e;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 24px;
      font-weight: 800;
      color: #3b82f6;
    }
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-secondary {
      background: rgba(255,255,255,.1);
      color: #b6c1d1;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,.15);
    }
    .log {
      background: rgba(0,0,0,.3);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 15px;
      max-height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      color: #7f8a9e;
    }
    .log-entry {
      margin-bottom: 4px;
    }
    .log-entry.info { color: #3b82f6; }
    .log-entry.success { color: #22c55e; }
    .log-entry.warn { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐉 P1-3 图表增量更新测试</h1>
    <div class="status">验证图表实例缓存 + 增量更新效果</div>
    
    <div class="grid">
      <div class="card">
        <h3>权益曲线（增量更新）</h3>
        <div class="chart-container">
          <canvas id="equityChart"></canvas>
        </div>
      </div>
      
      <div class="card">
        <h3>回撤曲线（增量更新）</h3>
        <div class="chart-container">
          <canvas id="drawdownChart"></canvas>
        </div>
      </div>
      
      <div class="card">
        <h3>盈亏走势（增量更新）</h3>
        <div class="chart-container">
          <canvas id="pnlChart"></canvas>
        </div>
      </div>
      
      <div class="card">
        <h3>决策分布（增量更新）</h3>
        <div class="chart-container">
          <canvas id="decisionChart"></canvas>
        </div>
      </div>
    </div>
    
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">更新次数</div>
        <div class="metric-value" id="update-count">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">图表实例数</div>
        <div class="metric-value" id="chart-instances">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">平均更新耗时</div>
        <div class="metric-value" id="avg-duration">0</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="btn-primary" onclick="startTest()">开始测试</button>
      <button class="btn-secondary" onclick="stopTest()">停止</button>
      <button class="btn-secondary" onclick="resetTest()">重置</button>
      <button class="btn-secondary" onclick="simulateData()">模拟数据更新</button>
    </div>
    
    <div class="log" id="log"></div>
  </div>

  <script>
    // 图表实例缓存
    const charts = {
      equity: null,
      drawdown: null,
      pnl: null,
      decision: null
    };
    
    // 测试状态
    let testRunning = false;
    let updateCount = 0;
    let totalDuration = 0;
    let testInterval = null;
    
    // 日志函数
    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    // 更新指标
    function updateMetrics() {
      document.getElementById('update-count').textContent = updateCount;
      document.getElementById('chart-instances').textContent = Object.values(charts).filter(c => c !== null).length;
      document.getElementById('avg-duration').textContent = updateCount > 0 ? (totalDuration / updateCount).toFixed(2) + 'ms' : '0ms';
    }
    
    // 通用线图配置
    function createLineChartConfig(title, label, borderColor, backgroundColor) {
      return {
        type: 'line',
        data: {
          labels: [],
          datasets: [{
            label: label,
            data: [],
            borderColor: borderColor,
            backgroundColor: backgroundColor,
            fill: true,
            tension: 0.4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 300 },
          plugins: {
            legend: { display: false },
            title: { display: true, text: title, color: '#b6c1d1' }
          },
          scales: {
            x: { ticks: { color: '#7f8a9e' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: '#7f8a9e' }, grid: { color: 'rgba(255,255,255,0.05)' } }
          }
        }
      };
    }
    
    // 增量更新线图
    function updateLineChart(chartRef, canvasId, configBuilder, labels, data) {
      const startTime = performance.now();
      
      if (!chartRef) {
        // 首次创建
        const ctx = document.getElementById(canvasId).getContext('2d');
        const config = configBuilder();
        config.data.labels = labels;
        config.data.datasets[0].data = data;
        chartRef = new Chart(ctx, config);
        log(`创建图表实例：${canvasId}`, 'success');
      } else {
        // 增量更新
        chartRef.data.labels = labels;
        chartRef.data.datasets[0].data = data;
        chartRef.update('none');
        log(`增量更新：${canvasId} (${(performance.now() - startTime).toFixed(2)}ms)`, 'info');
      }
      
      const duration = performance.now() - startTime;
      totalDuration += duration;
      updateCount++;
      updateMetrics();
      
      return chartRef;
    }
    
    // 模拟数据
    let baseValue = 1000;
    function generateData(count, type) {
      const data = [];
      for (let i = 0; i < count; i++) {
        baseValue += (Math.random() - 0.5) * 20;
        data.push({
          index: i + 1,
          equity: type === 'equity' ? baseValue : undefined,
          drawdown: type === 'drawdown' ? Math.random() * -10 : undefined,
          cumulative: type === 'pnl' ? (Math.random() - 0.5) * 100 : undefined
        });
      }
      return data;
    }
    
    // 更新所有图表
    function updateAllCharts() {
      const equityData = generateData(20, 'equity');
      const drawdownData = generateData(20, 'drawdown');
      const pnlData = generateData(20, 'pnl');
      
      charts.equity = updateLineChart(
        charts.equity,
        'equityChart',
        () => createLineChartConfig('权益曲线', '权益 (USDT)', '#3b82f6', 'rgba(59, 130, 246, 0.1)'),
        equityData.map(d => d.index),
        equityData.map(d => d.equity)
      );
      
      charts.drawdown = updateLineChart(
        charts.drawdown,
        'drawdownChart',
        () => createLineChartConfig('回撤曲线', '回撤 (%)', '#ef4444', 'rgba(239, 68, 68, 0.1)'),
        drawdownData.map(d => d.index),
        drawdownData.map(d => d.drawdown)
      );
      
      charts.pnl = updateLineChart(
        charts.pnl,
        'pnlChart',
        () => createLineChartConfig('盈亏走势', '累计盈亏', '#22c55e', 'rgba(34, 197, 94, 0.1)'),
        pnlData.map(d => d.index),
        pnlData.map(d => d.cumulative)
      );
    }
    
    // 测试控制
    function startTest() {
      if (testRunning) return;
      testRunning = true;
      log('开始自动更新测试（每 2 秒更新一次）', 'success');
      updateAllCharts();
      testInterval = setInterval(updateAllCharts, 2000);
    }
    
    function stopTest() {
      testRunning = false;
      if (testInterval) {
        clearInterval(testInterval);
        testInterval = null;
      }
      log('停止自动更新', 'warn');
    }
    
    function resetTest() {
      stopTest();
      updateCount = 0;
      totalDuration = 0;
      updateMetrics();
      document.getElementById('log').innerHTML = '';
      log('测试已重置', 'info');
    }
    
    function simulateData() {
      updateAllCharts();
      log('手动触发数据更新', 'info');
    }
    
    // 初始化
    log('P1-3 图表增量更新测试就绪', 'success');
    log('点击"开始测试"验证增量更新效果', 'info');
  </script>
</body>
</html>
