<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 小龙报表中心</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-0: #0a0f19;
      --bg-1: #121a27;
      --bg-2: #182233;
      --text-1: #f5f7fb;
      --text-2: #b6c1d1;
      --text-3: #7f8a9e;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at top, #142033 0%, var(--bg-0) 45%);
      color: var(--text-1);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* 顶部控制栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 { font-size: 24px; font-weight: 800; }
    .header p { color: var(--text-2); margin-top: 5px; }
    .controls { display: flex; gap: 10px; align-items: center; }
    .range-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-2);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
    }
    .range-btn:hover { background: rgba(255,255,255,0.1); }
    .range-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .refresh-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .refresh-btn:hover { background: #2563eb; }
    .last-updated { color: var(--text-3); font-size: 12px; margin-left: 10px; }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
    }
    .stat-card h3 {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-card h3::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 16px;
      border-radius: 2px;
    }
    .stat-card.alerts h3::before { background: var(--warning); }
    .stat-card.decisions h3::before { background: var(--success); }
    .stat-card.control h3::before { background: var(--info); }
    .stat-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .metric {
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border-radius: 8px;
    }
    .metric-label { color: var(--text-3); font-size: 11px; margin-bottom: 4px; }
    .metric-value { font-size: 20px; font-weight: 800; }
    .metric-value.critical { color: var(--danger); }
    .metric-value.warn { color: var(--warning); }
    .metric-value.info { color: var(--info); }
    .metric-value.success { color: var(--success); }
    
    /* 图表区 */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .chart-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
    }
    .chart-card h3 {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 15px;
    }
    .chart-container {
      position: relative;
      height: 250px;
    }
    
    /* Top 列表 */
    .top-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .top-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
    }
    .top-card h3 {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 15px;
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    th { color: var(--text-3); font-weight: 600; }
    td { color: var(--text-2); }
    
    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-3);
    }
    .error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 15px;
      color: var(--danger);
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 顶部控制栏 -->
    <div class="header">
      <div>
        <h1>📊 报表中心</h1>
        <p>基于 SQLite 的数据分析与趋势统计</p>
      </div>
      <div class="controls">
        <button class="range-btn" data-days="1">1D</button>
        <button class="range-btn active" data-days="7">7D</button>
        <button class="range-btn" data-days="30">30D</button>
        <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
        <span class="last-updated" id="last-updated"></span>
      </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-box" class="error" style="display: none;"></div>

    <!-- 加载状态 -->
    <div id="loading" class="loading">
      <div>加载中...</div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid" id="stats-grid" style="display: none;">
      <!-- 告警卡片 -->
      <div class="stat-card alerts">
        <h3>🚨 告警统计</h3>
        <div class="stat-metrics">
          <div class="metric">
            <div class="metric-label">总数</div>
            <div class="metric-value" id="alerts-total">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">CRITICAL</div>
            <div class="metric-value critical" id="alerts-critical">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">WARN</div>
            <div class="metric-value warn" id="alerts-warn">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">INFO</div>
            <div class="metric-value info" id="alerts-info">-</div>
          </div>
        </div>
      </div>

      <!-- 决策卡片 -->
      <div class="stat-card decisions">
        <h3>🧠 决策统计</h3>
        <div class="stat-metrics">
          <div class="metric">
            <div class="metric-label">总数</div>
            <div class="metric-value" id="decisions-total">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">拒绝率</div>
            <div class="metric-value" id="decisions-reject-rate">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">平均置信度</div>
            <div class="metric-value success" id="decisions-confidence">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">主要动作</div>
            <div class="metric-value" id="decisions-top-action">-</div>
          </div>
        </div>
      </div>

      <!-- 控制卡片 -->
      <div class="stat-card control">
        <h3>🎛️ 控制变更</h3>
        <div class="stat-metrics">
          <div class="metric">
            <div class="metric-label">总变更</div>
            <div class="metric-value" id="control-total">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">主要动作</div>
            <div class="metric-value" id="control-top-action">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">最近切换</div>
            <div class="metric-value" id="control-latest-action">-</div>
          </div>
          <div class="metric">
            <div class="metric-label">操作者</div>
            <div class="metric-value" id="control-operator">-</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 图表区 -->
    <div class="charts-grid" id="charts-grid" style="display: none;">
      <!-- 告警趋势 -->
      <div class="chart-card">
        <h3>📈 告警每日趋势</h3>
        <div class="chart-container">
          <canvas id="alert-trend-chart"></canvas>
        </div>
      </div>

      <!-- 告警级别堆叠 -->
      <div class="chart-card">
        <h3>📊 告警级别分布（每日）</h3>
        <div class="chart-container">
          <canvas id="alert-level-chart"></canvas>
        </div>
      </div>

      <!-- 决策动作分布 -->
      <div class="chart-card">
        <h3>🎯 决策动作分布</h3>
        <div class="chart-container">
          <canvas id="decision-action-chart"></canvas>
        </div>
      </div>

      <!-- 控制变更趋势 -->
      <div class="chart-card">
        <h3>📉 控制变更趋势</h3>
        <div class="chart-container">
          <canvas id="control-trend-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- Top 列表 -->
    <div class="top-section" id="top-section" style="display: none;">
      <!-- 告警类型 Top -->
      <div class="top-card">
        <h3>🔝 告警类型 Top 10</h3>
        <div id="alert-types-table">
          <table>
            <thead>
              <tr>
                <th>类型</th>
                <th>次数</th>
              </tr>
            </thead>
            <tbody id="alert-types-body"></tbody>
          </table>
        </div>
      </div>

      <!-- 告警来源 Top -->
      <div class="top-card">
        <h3>🔝 告警来源 Top 10</h3>
        <div id="alert-sources-table">
          <table>
            <thead>
              <tr>
                <th>来源</th>
                <th>次数</th>
              </tr>
            </thead>
            <tbody id="alert-sources-body"></tbody>
          </table>
        </div>
      </div>

      <!-- 最近控制动作 -->
      <div class="top-card">
        <h3>📋 最近控制动作</h3>
        <div id="control-actions-table">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>动作</th>
                <th>操作者</th>
              </tr>
            </thead>
            <tbody id="control-actions-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/reports';
    let currentDays = 7;
    let chartInstances = {};
    let refreshTimer = null;

    // 格式化时间
    function formatTime(ts) {
      if (!ts) return '-';
      return ts.replace('T', ' ').slice(0, 19);
    }

    // 格式化日期
    function formatDate(day) {
      if (!day) return '-';
      return day.slice(5); // MM-DD
    }

    // 显示错误
    function showError(msg) {
      const errorBox = document.getElementById('error-box');
      errorBox.textContent = msg;
      errorBox.style.display = 'block';
      setTimeout(() => { errorBox.style.display = 'none'; }, 5000);
    }

    // 更新最后刷新时间
    function updateLastUpdated() {
      const now = new Date();
      document.getElementById('last-updated').textContent = 
        `更新于 ${now.toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'})}`;
    }

    // 加载报表数据
    async function fetchReports(days) {
      try {
        const [alerts, decisions, control] = await Promise.all([
          fetch(`${API_BASE}/alerts?days=${days}`).then(r => r.json()),
          fetch(`${API_BASE}/decisions?days=${days}`).then(r => r.json()),
          fetch(`${API_BASE}/control?days=${days}`).then(r => r.json())
        ]);
        return { alerts, decisions, control };
      } catch (e) {
        showError(`加载失败：${e.message}`);
        return null;
      }
    }

    // 渲染统计卡片
    function renderCards(data) {
      const { alerts, decisions, control } = data;

      // 告警卡片
      document.getElementById('alerts-total').textContent = alerts.summary?.total || 0;
      document.getElementById('alerts-critical').textContent = alerts.summary?.CRITICAL || 0;
      document.getElementById('alerts-warn').textContent = alerts.summary?.WARN || 0;
      document.getElementById('alerts-info').textContent = alerts.summary?.INFO || 0;

      // 决策卡片
      document.getElementById('decisions-total').textContent = decisions.summary?.total || 0;
      document.getElementById('decisions-reject-rate').textContent = 
        `${((decisions.summary?.reject_rate || 0) * 100).toFixed(1)}%`;
      document.getElementById('decisions-confidence').textContent = 
        decisions.summary?.avg_confidence?.toFixed(3) || '0.000';
      
      const topAction = decisions.series?.action_distribution?.[0];
      document.getElementById('decisions-top-action').textContent = topAction?.action || '-';

      // 控制卡片
      document.getElementById('control-total').textContent = control.summary?.total || 0;
      const controlTopAction = control.series?.action_distribution?.[0];
      document.getElementById('control-top-action').textContent = controlTopAction?.action || '-';
      
      const latestMode = control.latest_mode_change;
      document.getElementById('control-latest-action').textContent = latestMode ? latestMode.action : '-';
      document.getElementById('control-operator').textContent = latestMode ? (latestMode.operator || '-') : '-';
    }

    // 渲染图表
    function renderCharts(data) {
      const { alerts, decisions, control } = data;

      // 告警趋势图
      renderLineChart('alert-trend-chart', chartInstances.alertTrend, {
        labels: alerts.series?.daily_counts?.map(d => formatDate(d.day)) || [],
        datasets: [{
          label: '告警数',
          data: alerts.series?.daily_counts?.map(d => d.value) || [],
          borderColor: '#f59e0b',
          backgroundColor: 'rgba(245, 158, 11, 0.1)',
          fill: true,
          tension: 0.4
        }],
        title: '每日告警趋势'
      }, (chart) => { chartInstances.alertTrend = chart; });

      // 告警级别堆叠图
      renderStackedBarChart('alert-level-chart', chartInstances.alertLevel, {
        labels: alerts.series?.level_daily?.map(d => d.day.slice(5)) || [],
        datasets: [
          { label: 'CRITICAL', data: alerts.series?.level_daily?.map(d => d.CRITICAL) || [], backgroundColor: '#ef4444' },
          { label: 'WARN', data: alerts.series?.level_daily?.map(d => d.WARN) || [], backgroundColor: '#f59e0b' },
          { label: 'INFO', data: alerts.series?.level_daily?.map(d => d.INFO) || [], backgroundColor: '#3b82f6' }
        ],
        title: '告警级别分布'
      }, (chart) => { chartInstances.alertLevel = chart; });

      // 决策动作分布图
      renderDoughnutChart('decision-action-chart', chartInstances.decisionAction, {
        labels: decisions.series?.action_distribution?.map(d => d.action) || [],
        data: decisions.series?.action_distribution?.map(d => d.count) || [],
        backgroundColor: ['#7f8a9e', '#22c55e', '#ef4444', '#f59e0b']
      }, (chart) => { chartInstances.decisionAction = chart; });

      // 控制变更趋势图
      renderLineChart('control-trend-chart', chartInstances.controlTrend, {
        labels: control.series?.daily_counts?.map(d => formatDate(d.day)) || [],
        datasets: [{
          label: '变更数',
          data: control.series?.daily_counts?.map(d => d.value) || [],
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          fill: true,
          tension: 0.4
        }],
        title: '控制变更趋势'
      }, (chart) => { chartInstances.controlTrend = chart; });
    }

    // 通用线图渲染
    function renderLineChart(canvasId, existingChart, config, callback) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (existingChart) {
        existingChart.data.labels = config.labels;
        existingChart.data.datasets = config.datasets;
        existingChart.update('none');
        callback(existingChart);
      } else {
        const chart = new Chart(ctx, {
          type: 'line',
          data: config,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              title: { display: true, text: config.title, color: '#b6c1d1' }
            },
            scales: {
              x: { ticks: { color: '#7f8a9e' }, grid: { color: 'rgba(255,255,255,0.05)' } },
              y: { ticks: { color: '#7f8a9e' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        });
        callback(chart);
      }
    }

    // 通用堆叠柱状图渲染
    function renderStackedBarChart(canvasId, existingChart, config, callback) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (existingChart) {
        existingChart.data.labels = config.labels;
        existingChart.data.datasets = config.datasets;
        existingChart.update('none');
        callback(existingChart);
      } else {
        const chart = new Chart(ctx, {
          type: 'bar',
          data: config,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { color: '#b6c1d1' } },
              title: { display: true, text: config.title, color: '#b6c1d1' }
            },
            scales: {
              x: { stacked: true, ticks: { color: '#7f8a9e' }, grid: { display: false } },
              y: { stacked: true, ticks: { color: '#7f8a9e' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
          }
        });
        callback(chart);
      }
    }

    // 通用环形图渲染
    function renderDoughnutChart(canvasId, existingChart, config, callback) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (existingChart) {
        existingChart.data.labels = config.labels;
        existingChart.data.datasets[0].data = config.data;
        existingChart.update('none');
        callback(existingChart);
      } else {
        const chart = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: config.labels,
            datasets: [{ data: config.data, backgroundColor: config.backgroundColor, borderWidth: 0 }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position: 'bottom', labels: { color: '#b6c1d1' } },
              title: { display: true, text: '决策动作分布', color: '#b6c1d1' }
            }
          }
        });
        callback(chart);
      }
    }

    // 渲染 Top 列表
    function renderTopLists(data) {
      const { alerts, control } = data;

      // 告警类型 Top
      const typesBody = document.getElementById('alert-types-body');
      typesBody.innerHTML = (alerts.top?.types || []).map(t => `
        <tr>
          <td>${t.type}</td>
          <td>${t.count}</td>
        </tr>
      `).join('') || '<tr><td colspan="2" style="text-align:center;color:var(--text-3)">暂无数据</td></tr>';

      // 告警来源 Top
      const sourcesBody = document.getElementById('alert-sources-body');
      sourcesBody.innerHTML = (alerts.top?.sources || []).map(s => `
        <tr>
          <td>${s.source || '-'}</td>
          <td>${s.count}</td>
        </tr>
      `).join('') || '<tr><td colspan="2" style="text-align:center;color:var(--text-3)">暂无数据</td></tr>';

      // 最近控制动作
      const actionsBody = document.getElementById('control-actions-body');
      const latestActions = control.latest_mode_change ? [control.latest_mode_change] : [];
      actionsBody.innerHTML = latestActions.length > 0 ? latestActions.map(a => `
        <tr>
          <td class="timestamp">${formatTime(a.ts)}</td>
          <td><span class="badge badge-info">${a.action}</span></td>
          <td>${a.operator || '-'}</td>
        </tr>
      `).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text-3)">暂无数据</td></tr>';
    }

    // 加载全部数据
    async function loadAll() {
      const loading = document.getElementById('loading');
      const statsGrid = document.getElementById('stats-grid');
      const chartsGrid = document.getElementById('charts-grid');
      const topSection = document.getElementById('top-section');

      loading.style.display = 'block';
      statsGrid.style.display = 'none';
      chartsGrid.style.display = 'none';
      topSection.style.display = 'none';

      const data = await fetchReports(currentDays);
      
      loading.style.display = 'none';

      if (data) {
        statsGrid.style.display = 'grid';
        chartsGrid.style.display = 'grid';
        topSection.style.display = 'grid';
        
        renderCards(data);
        renderCharts(data);
        renderTopLists(data);
        updateLastUpdated();
      }
    }

    // 绑定范围按钮
    function bindRangeButtons() {
      document.querySelectorAll('.range-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentDays = parseInt(btn.dataset.days);
          loadAll();
        });
      });
    }

    // 启动自动刷新
    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(loadAll, 30000); // 30 秒
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      bindRangeButtons();
      loadAll();
      startAutoRefresh();
    });
  </script>
</body>
</html>
