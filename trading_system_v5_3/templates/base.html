<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}🐉 小龙交易驾驶舱{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      /* 色彩系统 - 深色克制风格 */
      --bg-0: #0a0f19;
      --bg-1: #121a27;
      --bg-2: #182233;
      --text-1: #f5f7fb;
      --text-2: #b6c1d1;
      --text-3: #7f8a9e;
      
      /* 状态色 - 语义固定 */
      --danger: #ef4444;
      --danger-light: rgba(239,68,68,0.15);
      --warning: #f59e0b;
      --warning-light: rgba(245,158,11,0.15);
      --success: #22c55e;
      --success-light: rgba(34,197,94,0.15);
      --info: #3b82f6;
      --info-light: rgba(59,130,246,0.15);
      
      /* 边框系统 */
      --border-1: rgba(255,255,255,0.05);
      --border-2: rgba(255,255,255,0.1);
      
      /* 阴影系统 */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
      
      /* 圆角系统 */
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --radius-pill: 999px;
      
      /* 间距系统 */
      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 18px;
      --space-lg: 24px;
      --space-xl: 32px;
      
      /* Top Nav */
      --top-nav-height: 60px;
      --top-nav-bg: var(--bg-1);
      --top-nav-border: var(--border-1);
      
      /* Badge */
      --badge-height: 24px;
      --badge-radius: 6px;
      --badge-padding-x: 10px;
      --badge-padding-y: 4px;
      --badge-font-size: 12px;
      --badge-font-weight: 600;
      
      /* UI-3.7: Freshness Badge */
      --freshness-fresh: #22c55e;
      --freshness-delayed: #f59e0b;
      --freshness-stale: #ef4444;
      --freshness-threshold-fresh: 30;
      --freshness-threshold-delayed: 60;
      
      /* Loading / Empty / Error */
      --spinner-size: 40px;
      --spinner-border-width: 3px;
      --empty-min-height: 120px;
      
      /* Chart Header */
      --chart-title-size: 14px;
    }
    
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-0);
      color: var(--text-1);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    
    /* ===== Top Navigation ===== */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--top-nav-height);
      background: var(--top-nav-bg);
      border-bottom: 1px solid var(--top-nav-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-lg);
      z-index: 1000;
    }
    .top-nav-brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    .top-nav-brand h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      color: var(--text-1);
    }
    .top-nav-brand span {
      font-size: 12px;
      color: var(--text-3);
    }
    .top-nav-links {
      display: flex;
      gap: var(--space-xs);
    }
    .top-nav-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      color: var(--text-2);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    .top-nav-link:hover {
      background: var(--bg-2);
      color: var(--text-1);
    }
    .top-nav-link.active {
      background: var(--info-light);
      color: var(--info);
    }
    
    /* ===== Main Content ===== */
    .main-content {
      padding-top: var(--top-nav-height);
      min-height: 100vh;
    }
    
    /* ===== Shell ===== */
    .shell {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-lg);
    }
    
    /* ===== Header ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border-1);
    }
    .header-main { flex: 1; }
    .header-title {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: var(--space-xs);
    }
    .header-subtitle {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      color: var(--text-2);
      font-size: 14px;
    }
    .header-controls {
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }
    
    /* ===== Status Group ===== */
    .status-group {
      display: flex;
      gap: var(--space-xs);
      padding-left: var(--space-md);
      border-left: 1px solid var(--border-2);
      margin-left: var(--space-sm);
    }
    
    /* ===== Grid ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-lg);
    }
    .grid.top { margin-bottom: var(--space-lg); }
    
    /* ===== Card ===== */
    .card {
      background: var(--bg-1);
      border: 1px solid var(--border-1);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }
    .card h2 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 var(--space-md) 0;
      color: var(--text-1);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    /* ===== KPI ===== */
    .kpis {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-md);
    }
    .kpi {
      background: var(--bg-2);
      border-radius: var(--radius-md);
      padding: var(--space-md);
    }
    .kpi-label {
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 4px;
    }
    .kpi-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-1);
    }
    
    /* ===== Row ===== */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0;
      border-bottom: 1px solid var(--border-1);
    }
    .row:last-child { border-bottom: none; }
    .row .label { color: var(--text-2); font-size: 14px; }
    .row .value { font-weight: 600; font-size: 14px; }
    
    /* ===== Badge ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      height: var(--badge-height);
      padding: var(--badge-padding-y) var(--badge-padding-x);
      border-radius: var(--badge-radius);
      font-size: var(--badge-font-size);
      font-weight: var(--badge-font-weight);
      line-height: 1;
    }
    .badge-fresh { background: var(--freshness-fresh); color: #000; }
    .badge-delayed { background: var(--freshness-delayed); color: #000; }
    .badge-stale { background: var(--freshness-stale); color: #fff; }
    
    /* State badges */
    .state-ok { background: var(--success-light); color: var(--success); }
    .state-warn { background: var(--warning-light); color: var(--warning); }
    .state-error { background: var(--danger-light); color: var(--danger); }
    .state-neutral { background: var(--bg-2); color: var(--text-2); }
    
    /* PnL badges */
    .pnl-positive { background: var(--success-light); color: var(--success); }
    .pnl-negative { background: var(--danger-light); color: var(--danger); }
    
    /* Side badges */
    .side-long { background: var(--success-light); color: var(--success); }
    .side-short { background: var(--danger-light); color: var(--danger); }
    
    /* ===== Chip ===== */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-2);
      border-radius: var(--
