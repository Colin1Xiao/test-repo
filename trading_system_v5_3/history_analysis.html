<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 小龙历史分析</title>
  <style>
    :root {
      --bg-0: #0a0f19;
      --bg-1: #121a27;
      --bg-2: #182233;
      --text-1: #f5f7fb;
      --text-2: #b6c1d1;
      --text-3: #7f8a9e;
      --primary: #3b82f6;
      --success: #22c55e;
      --danger: #ef4444;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(circle at top, #142033 0%, var(--bg-0) 45%);
      color: var(--text-1);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header h1 { font-size: 24px; font-weight: 800; }
    .header p { color: var(--text-2); margin-top: 5px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
    }
    .stat-label { color: var(--text-3); font-size: 12px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-value.critical { color: var(--danger); }
    .stat-value.warn { color: var(--warning); }
    .section {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 16px;
      color: var(--text-2);
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-critical { background: rgba(239,68,68,.15); color: #ff9e9e; }
    .badge-warn { background: rgba(245,158,11,.15); color: #ffd27c; }
    .badge-info { background: rgba(59,130,246,.15); color: #cfe1ff; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    th { color: var(--text-3); font-weight: 600; font-size: 12px; }
    td { color: var(--text-2); font-size: 13px; }
    .level-critical { color: var(--danger); font-weight: 700; }
    .level-warn { color: var(--warning); font-weight: 700; }
    .level-info { color: var(--primary); font-weight: 700; }
    .chart-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .chart-container {
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 18px;
    }
    .chart-bar {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .chart-label {
      width: 120px;
      font-size: 13px;
      color: var(--text-2);
    }
    .chart-bar-inner {
      flex: 1;
      height: 24px;
      background: rgba(255,255,255,.05);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }
    .chart-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      transition: width 0.3s ease;
    }
    .fill-buy { background: var(--success); }
    .fill-sell { background: var(--danger); }
    .fill-hold { background: var(--text-3); }
    .fill-reject { background: var(--warning); color: #231300; }
    .refresh-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }
    .refresh-btn:hover { background: #2563eb; }
    .loading { color: var(--text-3); font-style: italic; }
    .error { color: var(--danger); }
    .timestamp { color: var(--text-3); font-size: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🐉 小龙历史分析</h1>
        <p>基于 SQLite 的历史事件查询与分析</p>
      </div>
      <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">告警总数</div>
        <div class="stat-value" id="stat-alerts">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CRITICAL</div>
        <div class="stat-value critical" id="stat-critical">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">WARN</div>
        <div class="stat-value warn" id="stat-warn">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">控制变更</div>
        <div class="stat-value" id="stat-control">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">决策事件</div>
        <div class="stat-value" id="stat-decisions">-</div>
      </div>
    </div>

    <!-- 决策动作分布 -->
    <div class="chart-row">
      <div class="chart-container">
        <h2>决策动作分布（最近 7 天）</h2>
        <div id="decision-chart"></div>
      </div>
      <div class="chart-container">
        <h2>告警级别分布</h2>
        <div id="alert-chart"></div>
      </div>
    </div>

    <!-- 最近告警 -->
    <div class="section">
      <h2>
        最近告警
        <span class="badge badge-critical" id="alert-critical-count">0</span>
      </h2>
      <div id="alerts-table">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 控制变更历史 -->
    <div class="section">
      <h2>
        控制变更历史
        <span class="timestamp" id="control-timestamp"></span>
      </h2>
      <div id="control-table">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/history';

    // 格式化时间
    function formatTime(ts) {
      if (!ts) return '-';
      return ts.replace('T', ' ').slice(0, 19);
    }

    // 渲染条形图
    function renderBarChart(containerId, data, colorMap) {
      const container = document.getElementById(containerId);
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading">无数据</div>';
        return;
      }

      const maxVal = Math.max(...data.map(d => d.cnt));
      const html = data.map(item => {
        const pct = maxVal > 0 ? (item.cnt / maxVal * 100) : 0;
        const color = colorMap[item.normalized_action] || colorMap[item.level] || '#3b82f6';
        const label = item.normalized_action || item.level;
        return `
          <div class="chart-bar">
            <div class="chart-label">${label}</div>
            <div class="chart-bar-inner">
              <div class="chart-fill ${colorMap[item.normalized_action] || colorMap[item.level] ? 'fill-' + (item.normalized_action || item.level).toLowerCase() : ''}" 
                   style="width: ${pct}%; background: ${color}">
                ${item.cnt}
              </div>
            </div>
          </div>
        `;
      }).join('');
      container.innerHTML = html;
    }

    // 加载告警
    async function loadAlerts() {
      try {
        const res = await fetch(`${API_BASE}/alerts?limit=20`);
        const data = await res.json();
        
        // 更新统计
        document.getElementById('stat-alerts').textContent = data.summary?.total || 0;
        document.getElementById('stat-critical').textContent = data.summary?.CRITICAL || 0;
        document.getElementById('stat-warn').textContent = data.summary?.WARN || 0;
        document.getElementById('alert-critical-count').textContent = `${data.summary?.CRITICAL || 0} CRITICAL`;

        // 渲染图表
        renderBarChart('alert-chart', [
          { level: 'CRITICAL', cnt: data.summary?.CRITICAL || 0 },
          { level: 'WARN', cnt: data.summary?.WARN || 0 },
          { level: 'INFO', cnt: data.summary?.INFO || 0 }
        ], { CRITICAL: '#ef4444', WARN: '#f59e0b', INFO: '#3b82f6' });

        // 渲染表格
        const table = document.getElementById('alerts-table');
        if (!data.items || data.items.length === 0) {
          table.innerHTML = '<div class="loading">无告警记录</div>';
          return;
        }

        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>级别</th>
                <th>类型</th>
                <th>标题</th>
                <th>消息</th>
              </tr>
            </thead>
            <tbody>
              ${data.items.map(item => `
                <tr>
                  <td class="timestamp">${formatTime(item.ts)}</td>
                  <td class="level-${item.level.toLowerCase()}">${item.level}</td>
                  <td>${item.type}</td>
                  <td>${item.title}</td>
                  <td>${item.message?.slice(0, 50) || ''}${item.message?.length > 50 ? '...' : ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('alerts-table').innerHTML = `<div class="error">加载失败：${e.message}</div>`;
      }
    }

    // 加载控制变更
    async function loadControl() {
      try {
        const res = await fetch(`${API_BASE}/control?limit=20`);
        const data = await res.json();
        
        document.getElementById('stat-control').textContent = data.count || 0;
        document.getElementById('control-timestamp').textContent = `共 ${data.count || 0} 条`;

        const table = document.getElementById('control-table');
        if (!data.items || data.items.length === 0) {
          table.innerHTML = '<div class="loading">无控制变更记录</div>';
          return;
        }

        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>动作</th>
                <th>操作者</th>
                <th>原因</th>
              </tr>
            </thead>
            <tbody>
              ${data.items.map(item => `
                <tr>
                  <td class="timestamp">${formatTime(item.ts)}</td>
                  <td><span class="badge badge-info">${item.action}</span></td>
                  <td>${item.operator || '-'}</td>
                  <td>${item.reason || '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('control-table').innerHTML = `<div class="error">加载失败：${e.message}</div>`;
      }
    }

    // 加载决策
    async function loadDecisions() {
      try {
        const res = await fetch(`${API_BASE}/decisions?limit=1`);
        const data = await res.json();
        
        document.getElementById('stat-decisions').textContent = data.summary?.reduce((a,b) => a + b.cnt, 0) || 0;

        // 渲染图表
        const colorMap = {
          buy: '#22c55e',
          sell: '#ef4444',
          hold: '#7f8a9e',
          reject_long: '#f59e0b',
          reject_short: '#f59e0b'
        };
        renderBarChart('decision-chart', data.summary || [], colorMap);
      } catch (e) {
        console.error('决策加载失败:', e);
      }
    }

    // 加载全部
    async function loadAll() {
      await Promise.all([
        loadAlerts(),
        loadControl(),
        loadDecisions()
      ]);
    }

    // 初始化
    loadAll();
    // 每 30 秒自动刷新
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
