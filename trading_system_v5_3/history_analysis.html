<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐉 小龙历史分析</title>
  <style>
    :root {
      /* 色彩系统 - 深色克制风格 - 保持原有 */
      --bg-0: #0a0f19;        /* 主背景 */
      --bg-1: #121a27;        /* 卡片背景 */
      --bg-2: #182233;        /* 次级容器 */
      --text-1: #f5f7fb;      /* 主文本 */
      --text-2: #b6c1d1;      /* 次级文本 */
      --text-3: #7f8a9e;      /* 灰色文本 */
      
      /* 状态色 - 语义固定 */
      --danger: #ef4444;      /* CRITICAL */
      --warning: #f59e0b;     /* WARN */
      --success: #22c55e;     /* SUCCESS */
      --info: #3b82f6;        /* INFO */
      
      /* 边框系统 */
      --border-1: rgba(255,255,255,0.05);  /* 弱边框 */
      --border-2: rgba(255,255,255,0.1);   /* 中边框 */
      
      /* 阴影系统 */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
      
      /* 圆角系统 */
      --radius-lg: 20px;      /* 大卡片 */
      --radius-md: 12px;      /* 小卡片/按钮 */
      --radius-sm: 8px;       /* badge */
      --radius-pill: 999px;   /* pill */
      
      /* 间距系统 */
      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 18px;
      --space-lg: 24px;
      --space-xl: 32px;
      
      /* ===== UI-3 Lite Tokens ===== */
      /* Badge */
      --badge-height: 24px;
      --badge-radius: 6px;
      --badge-padding-x: 10px;
      --badge-padding-y: 4px;
      --badge-font-size: 12px;
      --badge-font-weight: 600;
      --badge-line-height: 1.5;
      
      /* Loading / Empty / Error */
      --spinner-size: 40px;
      --spinner-border-width: 3px;
      --empty-min-height: 120px;
      --empty-font-size: 13px;
      --empty-color: var(--text-3);
      --empty-padding: 20px;
      --error-padding: 12px 16px;
      --error-radius: 8px;
      --error-border-left: 4px;
      --error-gap: 10px;
      
      /* Chart Header */
      --chart-title-size: 14px;
      --chart-title-weight: 600;
      --chart-header-padding: 18px;
      --chart-title-gap: 10px;
      --chart-icon-size: 16px;
      --chart-min-height: 220px;
      
      /* Hover / Transition */
      --hover-transition: 0.2s ease;
      --hover-transform: translateY(-2px);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: radial-gradient(circle at top, #142033 0%, var(--bg-0) 45%);
      color: var(--text-1);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      padding: var(--space-lg);
      min-height: 100vh;
    }
    
    .container { max-width: 1600px; margin: 0 auto; }
    /* 顶部控制栏 - 统一布局 */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-md);
      border-bottom: 1px solid var(--border-2);
    }
    
    .header-title-area {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    
    .header-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }
    
    .header-title .icon { font-size: 32px; }
    
    .header-subtitle {
      color: var(--text-2);
      font-size: 13px;
    }
    
    /* 刷新按钮 */
    .refresh-btn {
      background: linear-gradient(135deg, var(--info), #2563eb);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    
    .refresh-btn {
      transition: all var(--hover-transition);
    }
    
    .refresh-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59,130,246,0.4);
    }
    
    .refresh-btn:active {
      transform: translateY(0);
    }
    
    /* 统计卡片 - 20px 圆角，渐变边框 */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    
    .stat-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--info), rgba(59,130,246,0.3));
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .stat-label {
      color: var(--text-3);
      font-size: 11px;
      margin-bottom: var(--space-sm);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-1);
    }
    
    .stat-value.critical { color: var(--danger); }
    .stat-value.warn { color: var(--warning); }
    .stat-value.info { color: var(--info); }
    .stat-value.success { color: var(--success); }
    /* Section 区域 (UI-3 Lite) */
    .section {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-xl);
      transition: all var(--hover-transition);
    }
    
    .section:hover {
      transform: var(--hover-transform);
      box-shadow: var(--shadow-md);
      border-color: var(--border-2);
    }
    
    .section h2 {
      font-size: 16px;
      color: var(--text-2);
      margin-bottom: var(--space-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }
    
    /* Badge 样式 (UI-3 Lite) */
    .badge {
      height: var(--badge-height);
      padding: var(--badge-padding-y) var(--badge-padding-x);
      border-radius: var(--badge-radius);
      font-size: var(--badge-font-size);
      font-weight: var(--badge-font-weight);
      line-height: var(--badge-line-height);
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      border: 1px solid;
    }
    
    .badge-critical { 
      background: var(--danger-light); 
      color: var(--danger); 
      border-color: var(--danger);
    }
    .badge-warn { 
      background: var(--warning-light); 
      color: var(--warning);
      border-color: var(--warning);
    }
    .badge-info { 
      background: var(--info-light); 
      color: var(--info);
      border-color: var(--info);
    }
    
    /* 表格样式 */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th, td {
      padding: var(--space-xs) var(--space-sm);
      text-align: left;
      border-bottom: 1px solid var(--border-1);
    }
    
    th {
      color: var(--text-3);
      font-weight: 600;
      padding-top: var(--space-md);
      padding-bottom: var(--space-xs);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    td {
      color: var(--text-2);
    }
    
    .level-critical { color: var(--danger); font-weight: 700; }
    .level-warn { color: var(--warning); font-weight: 700; }
    .level-info { color: var(--info); font-weight: 700; }
    
    .timestamp { color: var(--text-3); font-size: 12px; }
    /* 图表容器 */
    .chart-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    
    .chart-container {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
      padding: var(--chart-header-padding);
      transition: all var(--hover-transition);
    }
    
    .chart-container:hover {
      transform: var(--hover-transform);
      box-shadow: var(--shadow-md);
      border-color: var(--border-2);
    }
    
    .chart-container h2 {
      font-size: 15px;
      color: var(--text-2);
      margin-bottom: var(--space-md);
      font-weight: 600;
    }
    
    /* 条形图样式 */
    .chart-bar {
      display: flex;
      align-items: center;
      margin-bottom: var(--space-sm);
      gap: var(--space-sm);
    }
    
    .chart-label {
      min-width: 140px;
      font-size: 13px;
      color: var(--text-2);
      font-weight: 600;
    }
    
    .chart-bar-inner {
      flex: 1;
      height: 32px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      overflow: hidden;
      position: relative;
    }
    
    .chart-fill {
      height: 100%;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: var(--space-sm);
      font-size: 13px;
      font-weight: 800;
      color: white;
      transition: width 0.3s ease;
      min-width: 40px;
    }
    
    .fill-buy { background: linear-gradient(90deg, var(--success), #16a34a); }
    .fill-sell { background: linear-gradient(90deg, var(--danger), #dc2626); }
    .fill-hold { background: linear-gradient(90deg, var(--text-3), #64748b); }
    .fill-reject { background: linear-gradient(90deg, var(--warning), #d97706); color: #1a1a1a; }
    .fill-critical { background: linear-gradient(90deg, var(--danger), #dc2626); }
    .fill-warn { background: linear-gradient(90deg, var(--warning), #d97706); }
    .fill-info { background: linear-gradient(90deg, var(--info), #2563eb); }
    
    /* 加载和错误状态 (UI-3 Lite) */
    .loading-spinner {
      width: var(--spinner-size);
      height: var(--spinner-size);
      border: var(--spinner-border-width) solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--info);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 12px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading { 
      color: var(--text-3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: var(--empty-min-height);
      padding: var(--space-lg);
      text-align: center;
    }
    
    .loading-text {
      font-size: var(--empty-font-size);
      color: var(--text-3);
    }
    
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: var(--empty-min-height);
      padding: var(--empty-padding);
      color: var(--empty-color);
      font-size: var(--empty-font-size);
      text-align: center;
    }
    
    .error { 
      display: flex;
      align-items: center;
      gap: var(--error-gap);
      color: var(--danger);
      background: linear-gradient(90deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
      border: 1px solid var(--danger);
      border-left: var(--error-border-left) solid var(--danger);
      border-radius: var(--error-radius);
      padding: var(--error-padding);
      margin: var(--space-md) 0;
      animation: fadeIn 0.3s ease;
    }
    
    .error .icon {
      font-size: 18px;
      flex-shrink: 0;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title-area">
        <div class="header-title">
          <span class="icon">📜</span>
          <span>历史分析</span>
        </div>
        <div class="header-subtitle">基于 SQLite 的历史事件查询与分析</div>
      </div>
      <button class="refresh-btn" onclick="loadAll()">
        <span class="icon">🔄</span>
        <span>刷新</span>
      </button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">告警总数</div>
        <div class="stat-value" id="stat-alerts">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CRITICAL</div>
        <div class="stat-value critical" id="stat-critical">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">WARN</div>
        <div class="stat-value warn" id="stat-warn">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">控制变更</div>
        <div class="stat-value info" id="stat-control">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">决策事件</div>
        <div class="stat-value success" id="stat-decisions">-</div>
      </div>
    </div>

    <!-- 决策动作分布 -->
    <div class="chart-row">
      <div class="chart-container">
        <h2>决策动作分布（最近 7 天）</h2>
        <div id="decision-chart"></div>
      </div>
      <div class="chart-container">
        <h2>告警级别分布</h2>
        <div id="alert-chart"></div>
      </div>
    </div>

    <!-- 最近告警 -->
    <div class="section">
      <h2>
        最近告警
        <span class="badge badge-critical" id="alert-critical-count">0</span>
      </h2>
      <div id="alerts-table">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 控制变更历史 -->
    <div class="section">
      <h2>
        控制变更历史
        <span class="timestamp" id="control-timestamp"></span>
      </h2>
      <div id="control-table">
        <div class="loading">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api/history';

    // 格式化时间
    function formatTime(ts) {
      if (!ts) return '-';
      return ts.replace('T', ' ').slice(0, 19);
    }

    // 渲染条形图
    function renderBarChart(containerId, data, colorMap) {
      const container = document.getElementById(containerId);
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="loading">无数据</div>';
        return;
      }

      const maxVal = Math.max(...data.map(d => d.cnt));
      const html = data.map(item => {
        const pct = maxVal > 0 ? (item.cnt / maxVal * 100) : 0;
        const color = colorMap[item.normalized_action] || colorMap[item.level] || '#3b82f6';
        const label = item.normalized_action || item.level;
        return `
          <div class="chart-bar">
            <div class="chart-label">${label}</div>
            <div class="chart-bar-inner">
              <div class="chart-fill ${colorMap[item.normalized_action] || colorMap[item.level] ? 'fill-' + (item.normalized_action || item.level).toLowerCase() : ''}" 
                   style="width: ${pct}%; background: ${color}">
                ${item.cnt}
              </div>
            </div>
          </div>
        `;
      }).join('');
      container.innerHTML = html;
    }

    // 加载告警
    async function loadAlerts() {
      try {
        const res = await fetch(`${API_BASE}/alerts?limit=20`);
        const data = await res.json();
        
        // 更新统计
        document.getElementById('stat-alerts').textContent = data.summary?.total || 0;
        document.getElementById('stat-critical').textContent = data.summary?.CRITICAL || 0;
        document.getElementById('stat-warn').textContent = data.summary?.WARN || 0;
        document.getElementById('alert-critical-count').textContent = `${data.summary?.CRITICAL || 0} CRITICAL`;

        // 渲染图表
        renderBarChart('alert-chart', [
          { level: 'CRITICAL', cnt: data.summary?.CRITICAL || 0 },
          { level: 'WARN', cnt: data.summary?.WARN || 0 },
          { level: 'INFO', cnt: data.summary?.INFO || 0 }
        ], { CRITICAL: '#ef4444', WARN: '#f59e0b', INFO: '#3b82f6' });

        // 渲染表格
        const table = document.getElementById('alerts-table');
        if (!data.items || data.items.length === 0) {
          table.innerHTML = '<div class="loading">无告警记录</div>';
          return;
        }

        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>级别</th>
                <th>类型</th>
                <th>标题</th>
                <th>消息</th>
              </tr>
            </thead>
            <tbody>
              ${data.items.map(item => `
                <tr>
                  <td class="timestamp">${formatTime(item.ts)}</td>
                  <td class="level-${item.level.toLowerCase()}">${item.level}</td>
                  <td>${item.type}</td>
                  <td>${item.title}</td>
                  <td>${item.message?.slice(0, 50) || ''}${item.message?.length > 50 ? '...' : ''}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('alerts-table').innerHTML = `<div class="error">加载失败：${e.message}</div>`;
      }
    }

    // 加载控制变更
    async function loadControl() {
      try {
        const res = await fetch(`${API_BASE}/control?limit=20`);
        const data = await res.json();
        
        document.getElementById('stat-control').textContent = data.count || 0;
        document.getElementById('control-timestamp').textContent = `共 ${data.count || 0} 条`;

        const table = document.getElementById('control-table');
        if (!data.items || data.items.length === 0) {
          table.innerHTML = '<div class="loading">无控制变更记录</div>';
          return;
        }

        table.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>动作</th>
                <th>操作者</th>
                <th>原因</th>
              </tr>
            </thead>
            <tbody>
              ${data.items.map(item => `
                <tr>
                  <td class="timestamp">${formatTime(item.ts)}</td>
                  <td><span class="badge badge-info">${item.action}</span></td>
                  <td>${item.operator || '-'}</td>
                  <td>${item.reason || '-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        document.getElementById('control-table').innerHTML = `<div class="error">加载失败：${e.message}</div>`;
      }
    }

    // 加载决策
    async function loadDecisions() {
      try {
        const res = await fetch(`${API_BASE}/decisions?limit=1`);
        const data = await res.json();
        
        document.getElementById('stat-decisions').textContent = data.summary?.reduce((a,b) => a + b.cnt, 0) || 0;

        // 渲染图表
        const colorMap = {
          buy: '#22c55e',
          sell: '#ef4444',
          hold: '#7f8a9e',
          reject_long: '#f59e0b',
          reject_short: '#f59e0b'
        };
        renderBarChart('decision-chart', data.summary || [], colorMap);
      } catch (e) {
        console.error('决策加载失败:', e);
      }
    }

    // 加载全部
    async function loadAll() {
      await Promise.all([
        loadAlerts(),
        loadControl(),
        loadDecisions()
      ]);
    }

    // 初始化
    loadAll();
    // 每 30 秒自动刷新
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
