name: Test Gate

on:
  push:
    branches: ['**']  # 所有分支
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: cd openclaw-runtime && npm ci
    
    - name: Run P0 consistency tests
      run: cd openclaw-runtime && npm test -- --testPathPattern="consistency" --verbose
      env:
        CI: true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
      if: ${{ always() }}
