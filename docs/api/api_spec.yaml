  # ==================== WebSocket 端点 ====================
  /ws/market:
    get:
      tags:
        - 市场数据
      summary: 市场数据 WebSocket
      description: 订阅实时市场数据更新
      parameters:
        - name: symbols
          in: query
          schema:
            type: array
            items:
              type: string
        - name: channels
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [kline, orderbook, ticker, trade]

  /ws/signals:
    get:
      tags:
        - 信号
      summary: 信号 WebSocket
      description: 订阅实时交易信号
      parameters:
        - name: symbols
          in: query
          schema:
            type: array
            items:
              type: string

  /ws/alerts:
    get:
      tags:
        - 监控
      summary: 预警 WebSocket
      description: 订阅实时预警通知
      parameters:
        - name: severity
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [low, medium, high, critical]

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ==================== 认证相关 ====================
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
        two_factor_code:
          type: string
          description: 两步验证代码 (可选)

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
          default: Bearer

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        expires_in:
          type: integer

    # ==================== 账户相关 ====================
    TradingAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        exchange:
          type: string
          enum: [OKX, BINANCE, BYBIT]
        account_type:
          type: string
          enum: [spot, futures, margin]
        balance:
          type: number
        equity:
          type: number
        status:
          type: string
          enum: [active, inactive, suspended]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAccountRequest:
      type: object
      required:
        - exchange
        - account_type
        - api_key
        - api_secret
      properties:
        exchange:
          type: string
          enum: [OKX, BINANCE, BYBIT]
        account_type:
          type: string
          enum: [spot, futures, margin]
        api_key:
          type: string
        api_secret:
          type: string
        initial_balance:
          type: number

    UpdateAccountRequest:
      type: object
      properties:
        api_key:
          type: string
        api_secret:
          type: string
        risk_settings:
          $ref: '#/components/schemas/RiskLimits'

    AccountBalance:
      type: object
      properties:
        total_balance:
          type: number
        available_balance:
          type: number
        unrealized_pnl:
          type: number
        realized_pnl:
          type: number
        margin_ratio:
          type: number
        positions_value:
          type: number
        updated_at:
          type: string
          format: date-time

    # ==================== 市场数据相关 ====================
    Kline:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
        turnover:
          type: number

    OrderBook:
      type: object
      properties:
        symbol:
          type: string
        timestamp:
          type: integer
          format: int64
        bids:
          type: array
          items:
            type: array
            items:
              type: number
            description: [price, size]
        asks:
          type: array
          items:
            type: array
            items:
              type: number
            description: [price, size]

    Ticker:
      type: object
      properties:
        symbol:
          type: string
        last_price:
          type: number
        price_change_24h:
          type: number
        price_change_percent_24h:
          type: number
        high_24h:
          type: number
        low_24h:
          type: number
        volume_24h:
          type: number
        turnover_24h:
          type: number
        timestamp:
          type: integer
          format: int64

    FundingRate:
      type: object
      properties:
        symbol:
          type: string
        funding_rate:
          type: number
        next_funding_time:
          type: integer
          format: int64
        predicted_funding_rate:
          type: number

    OpenInterest:
      type: object
      properties:
        symbol:
          type: string
        open_interest:
          type: number
        open_interest_value:
          type: number
        timestamp:
          type: integer
          format: int64

    # ==================== 分析相关 ====================
    MarketState:
      type: object
      properties:
        symbol:
          type: string
        state:
          type: string
          enum: [strong_uptrend, weak_uptrend, ranging, weak_downtrend, strong_downtrend, breakout, reversal]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        trend_strength:
          type: number
          minimum: 0
          maximum: 1
        volatility:
          type: number
        support_levels:
          type: array
          items:
            type: number
        resistance_levels:
          type: array
          items:
            type: number
        timestamp:
          type: string
          format: date-time

    SentimentAnalysis:
      type: object
      properties:
        symbol:
          type: string
        sentiment_score:
          type: number
          minimum: -1
          maximum: 1
        sentiment_class:
          type: string
          enum: [very_bearish, bearish, neutral, bullish, very_bullish]
        social_volume:
          type: number
        news_sentiment:
          type: number
        fear_greed_index:
          type: number
          minimum: 0
          maximum: 100
        extreme_alert:
          type: boolean
        timestamp:
          type: string
          format: date-time

    MLPrediction:
      type: object
      properties:
        symbol:
          type: string
        horizon:
          type: string
        price_direction:
          type: string
          enum: [up, down, neutral]
        price_probability:
          type: object
          properties:
            up:
              type: number
            down:
              type: number
            neutral:
              type: number
        predicted_price:
          type: number
        predicted_volatility:
          type: number
        trend_strength:
          type: number
        confidence:
          type: number
        model_version:
          type: string
        timestamp:
          type: string
          format: date-time

    EventImpactAnalysis:
      type: object
      properties:
        symbol:
          type: string
        event_score:
          type: number
          minimum: -1
          maximum: 1
        upcoming_events:
          type: array
          items:
            $ref: '#/components/schemas/ScheduledEvent'
        recent_impacts:
          type: array
          items:
            $ref: '#/components/schemas/EventImpact'
        event_coefficient:
          type: number
          minimum: 0.5
          maximum: 1.5

    ScheduledEvent:
      type: object
      properties:
        event_type:
          type: string
        description:
          type: string
        scheduled_time:
          type: string
          format: date-time
        predicted_impact:
          type: number
        confidence:
          type: number

    EventImpact:
      type: object
      properties:
        event_type:
          type: string
        description:
          type: string
        occurred_at:
          type: string
          format: date-time
        actual_impact:
          type: number
        duration:
          type: string

    TechnicalIndicator:
      type: object
      properties:
        symbol:
          type: string
        indicator_type:
          type: string
        interval:
          type: string
        value:
          type: number
        signal:
          type: string
          enum: [buy, sell, neutral]
        timestamp:
          type: string
          format: date-time

    # ==================== 信号相关 ====================
    TradingSignal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        direction:
          type: string
          enum: [LONG, SHORT, NEUTRAL]
        strength:
          type: number
          minimum: 0
          maximum: 1
        confidence:
          type: number
          minimum: 0
          maximum: 1
        composite_score:
          type: number
          minimum: -1
          maximum: 1
        component_scores:
          type: object
          properties:
            event:
              type: number
            ml:
              type: number
            sentiment:
              type: number
            technical:
              type: number
        entry_zone:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2
        stop_loss:
          type: number
        take_profit:
          type: array
          items:
            type: number
        suggested_leverage:
          type: number
        status:
          type: string
          enum: [active, executed, expired, cancelled]
        created_at:
          type: string
          format: date-time
        expiry:
          type: string
          format: date-time

    GenerateSignalRequest:
      type: object
      required:
        - symbol
      properties:
        symbol:
          type: string
        force_refresh:
          type: boolean
          default: false

    ExecuteSignalRequest:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        position_size:
          type: number
          description: 覆盖自动计算的仓位大小
        leverage:
          type: number
          description: 覆盖自动计算的杠杆

    # ==================== 交易相关 ====================
    Trade:
      type: object
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [LONG, SHORT]
        size:
          type: number
        entry_price:
          type: number
        current_price:
          type: number
        exit_price:
          type: number
        leverage:
          type: number
        pnl:
          type: number
        pnl_percent:
          type: number
        stop_loss:
          type: number
        take_profit:
          type: array
          items:
            type: number
        status:
          type: string
          enum: [open, closed, cancelled, liquidated]
        signal_id:
          type: string
          format: uuid
        strategy_id:
          type: string
          format: uuid
        opened_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
        notes:
          type: string

    Order:
      type: object
      properties:
        id:
          type: string
        account_id:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit, stop_limit, trigger]
        size:
          type: number
        price:
          type: number
        filled_size:
          type: number
        avg_fill_price:
          type: number
        status:
          type: string
          enum: [pending, partially_filled, filled, cancelled, rejected]
        time_in_force:
          type: string
          enum: [GTC, IOC, FOK]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrderRequest:
      type: object
      required:
        - account_id
        - symbol
        - side
        - type
        - size
      properties:
        account_id:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        type:
          type: string
          enum: [market, limit, stop_limit, trigger]
        size:
          type: number
        price:
          type: number
        stop_price:
          type: number
        time_in_force:
          type: string
          enum: [GTC, IOC, FOK]
        leverage:
          type: number
        reduce_only:
          type: boolean
          default: false

    ClosePositionRequest:
      type: object
      properties:
        percentage:
          type: number
          minimum: 0
          maximum: 100
          default: 100
        order_type:
          type: string
          enum: [market, limit]
          default: market
        price:
          type: number
          description: 限价单价格

    Position:
      type: object
      properties:
        id:
          type: string
          format: uuid
        trade_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [LONG, SHORT]
        size:
          type: number
        entry_price:
          type: number
        current_price:
          type: number
        mark_price:
          type: number
        unrealized_pnl:
          type: number
        unrealized_pnl_percent:
          type: number
        leverage:
          type: number
        margin:
          type: number
        liquidation_price:
          type: number
        stop_loss:
          type: number
        take_profit:
          type: array
          items:
            type: number
        opened_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrderResult:
      type: object
      properties:
        order_id:
          type: string
        status:
          type: string
        filled_size:
          type: number
        avg_fill_price:
          type: number
        total_fees:
          type: number
        execution_time_ms:
          type: integer

    # ==================== 风控相关 ====================
    RiskMetrics:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        total_exposure:
          type: number
        exposure_ratio:
          type: number
        daily_pnl:
          type: number
        daily_pnl_percent:
          type: number
        current_drawdown:
          type: number
        max_drawdown:
          type: number
        var_95:
          type: number
          description: 95% 置信度下的风险价值
        sharpe_ratio:
          type: number
        win_rate:
          type: number
        profit_factor:
          type: number
        total_trades:
          type: integer
        open_positions:
          type: integer
        margin_ratio:
          type: number
        updated_at:
          type: string
          format: date-time

    RiskLimits:
      type: object
      properties:
        max_position_size:
          type: number
          default: 0.2
          description: 单笔最大仓位比例
        max_total_exposure:
          type: number
          default: 0.5
          description: 总仓位上限比例
        max_leverage:
          type: integer
          default: 10
          description: 最大杠杆倍数
        max_daily_loss:
          type: number
          default: 0.05
          description: 日最大亏损比例
        max_drawdown:
          type: number
          default: 0.15
          description: 最大回撤比例
        circuit_breaker_loss:
          type: number
          default: 0.03
          description: 熔断亏损阈值
        max_positions:
          type: integer
          default: 10
          description: 最大持仓数量

    CircuitBreakerStatus:
      type: object
      properties:
        is_triggered:
          type: boolean
        triggered_at:
          type: string
          format: date-time
        reason:
          type: string
        triggered_by:
          type: string
          enum: [auto, manual]
        auto_reset_at:
          type: string
          format: date-time

    TradeRequest:
      type: object
      required:
        - account_id
        - symbol
        - side
        - size
      properties:
        account_id:
          type: string
          format: uuid
        symbol:
          type: string
        side:
          type: string
          enum: [LONG, SHORT]
        size:
          type: number
        leverage:
          type: number
        entry_price:
          type: number

    ValidationResult:
      type: object
      properties:
        is_valid:
          type: boolean
        checks:
          type: array
          items:
            type: object
            properties:
              check_name:
                type: string
              passed:
                type: boolean
              message:
                type: string
        errors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    # ==================== 监控相关 ====================
    DashboardData:
      type: object
      properties:
        summary:
          type: object
          properties:
            total_equity:
              type: number
            total_pnl:
              type: number
            total_pnl_percent:
              type: number
            daily_pnl:
              type: number
            open_positions:
              type: integer
            active_signals:
              type: integer
        positions_summary:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        recent_trades:
          type: array
          items:
            $ref: '#/components/schemas/Trade'
        active_alerts:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        system_health:
          $ref: '#/components/schemas/SystemHealth'

    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [price_anomaly, volatility_spike, extreme_sentiment, system_fault, risk_breach, circuit_breaker]
        severity:
          type: string
          enum: [low, medium, high, critical]
        title:
          type: string
        message:
          type: string
        symbol:
          type: string
        current_value:
          type: number
        threshold:
          type: number
        status:
          type: string
          enum: [active, acknowledged, resolved]
        created_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        acknowledged_by:
          type: string
        resolved_at:
          type: string
          format: date-time

    CreateAlertRequest:
      type: object
      required:
        - type
        - severity
        - title
        - message
      properties:
        type:
          type: string
        severity:
          type: string
        title:
          type: string
        message:
          type: string
        symbol:
          type: string
        threshold:
          type: number

    SystemHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        services:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              status:
                type: string
              uptime_percent:
                type: number
              last_check:
                type: string
                format: date-time
        latency:
          type: object
          properties:
            api_p50_ms:
              type: number
            api_p95_ms:
              type: number
            data_freshness_ms:
              type: number
        resources:
          type: object
          properties:
            cpu_usage:
              type: number
            memory_usage:
              type: number
            disk_usage:
              type: number
        updated_at:
          type: string
          format: date-time

    SystemMetric:
      type: object
      properties:
        service:
          type: string
        metric_name:
          type: string
        value:
          type: number
        unit:
          type: string
        timestamp:
          type: string
          format: date-time

    # ==================== 报告相关 ====================
    DailyReport:
      type: object
      properties:
        date:
          type: string
          format: date
        summary:
          type: object
          properties:
            starting_equity:
              type: number
            ending_equity:
              type: number
