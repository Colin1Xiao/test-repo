  # ==================== 配置端点 ====================
  /config/system:
    get:
      tags:
        - 配置
      summary: 获取系统配置
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfig'
    
    put:
      tags:
        - 配置
      summary: 更新系统配置
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfig'
      responses:
        '200':
          description: 更新成功

  /config/strategy:
    get:
      tags:
        - 配置
      summary: 获取策略配置
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StrategyConfig'
    
    post:
      tags:
        - 配置
      summary: 创建策略配置
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StrategyConfig'
      responses:
        '201':
          description: 创建成功

  /config/strategy/{strategy_id}:
    put:
      tags:
        - 配置
      summary: 更新策略配置
      security:
        - BearerAuth: []
      parameters:
        - name: strategy_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
