openapi: 3.0.3
info:
  title: 预测性智能交易系统 API
  description: |
    智能交易系统的 RESTful API 规范
    
    ## 认证方式
    所有 API 请求需要在 Header 中包含 JWT Token:
    ```
    Authorization: Bearer <token>
    ```
    
    ## 速率限制
    - 普通端点：100 请求/分钟
    - 交易端点：20 请求/分钟
    - 数据端点：200 请求/分钟
    
    ## 错误码
    - 400: 请求参数错误
    - 401: 未授权
    - 403: 禁止访问
    - 404: 资源不存在
    - 429: 请求超限
    - 500: 服务器内部错误
  version: 1.0.0
  contact:
    name: API Support
    email: support@trading-system.com

servers:
  - url: https://api.trading-system.com/v1
    description: 生产环境
  - url: https://staging-api.trading-system.com/v1
    description: 测试环境
  - url: http://localhost:8000/v1
    description: 本地开发

tags:
  - name: 认证
    description: 用户认证和授权
  - name: 账户
    description: 交易账户管理
  - name: 市场数据
    description: 实时市场数据查询
  - name: 分析
    description: 市场分析和预测
  - name: 信号
    description: 交易信号管理
  - name: 交易
    description: 订单执行和仓位管理
  - name: 风控
    description: 风险控制和监控
  - name: 监控
    description: 系统监控和预警
  - name: 报告
    description: 性能报告和分析
  - name: 配置
    description: 系统配置管理

paths:
  # ==================== 认证端点 ====================
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 认证失败

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新 Token
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功

  # ==================== 账户端点 ====================
  /accounts:
    get:
      tags:
        - 账户
      summary: 获取交易账户列表
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradingAccount'
    
    post:
      tags:
        - 账户
      summary: 创建交易账户
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: 账户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingAccount'

  /accounts/{account_id}:
    get:
      tags:
        - 账户
      summary: 获取账户详情
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingAccount'
    
    put:
      tags:
        - 账户
      summary: 更新账户配置
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: 更新成功
    
    delete:
      tags:
        - 账户
      summary: 删除账户
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 删除成功

  /accounts/{account_id}/balance:
    get:
      tags:
        - 账户
      summary: 获取账户余额
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'

  # ==================== 市场数据端点 ====================
  /market/klines:
    get:
      tags:
        - 市场数据
      summary: 获取 K 线数据
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTC-USDT
        - name: interval
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 5m, 15m, 30m, 1h, 4h, 1d, 1w]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
        - name: start_time
          in: query
          schema:
            type: integer
            format: int64
            description: 开始时间戳 (毫秒)
        - name: end_time
          in: query
          schema:
            type: integer
            format: int64
            description: 结束时间戳 (毫秒)
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Kline'

  /market/orderbook:
    get:
      tags:
        - 市场数据
      summary: 获取订单簿
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
            example: BTC-USDT
        - name: depth
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderBook'

  /market/ticker:
    get:
      tags:
        - 市场数据
      summary: 获取行情 Ticker
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticker'

  /market/funding-rate:
    get:
      tags:
        - 市场数据
      summary: 获取资金费率
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FundingRate'

  /market/open-interest:
    get:
      tags:
        - 市场数据
      summary: 获取持仓量
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenInterest'

  # ==================== 分析端点 ====================
  /analysis/market-state:
    get:
      tags:
        - 分析
      summary: 获取市场状态
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketState'

  /analysis/sentiment:
    get:
      tags:
        - 分析
      summary: 获取情绪分析结果
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentimentAnalysis'

  /analysis/ml-prediction:
    get:
      tags:
        - 分析
      summary: 获取 ML 预测结果
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: horizon
          in: query
          schema:
            type: string
            enum: [1h, 4h, 1d, 1w]
            default: 1d
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MLPrediction'

  /analysis/event-impact:
    get:
      tags:
        - 分析
      summary: 获取事件影响分析
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: window
          in: query
          schema:
            type: string
            default: 24h
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventImpactAnalysis'

  /analysis/technical-indicators:
    get:
      tags:
        - 分析
      summary: 获取技术指标
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
        - name: indicators
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [RSI, MACD, EMA, SMA, BOLL, KDJ, ADX, ATR]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TechnicalIndicator'

  # ==================== 信号端点 ====================
  /signals:
    get:
      tags:
        - 信号
      summary: 获取交易信号列表
      security:
        - BearerAuth: []
      parameters:
        - name: symbol
          in: query
          schema:
            type: string
        - name: direction
          in: query
          schema:
            type: string
            enum: [LONG, SHORT, NEUTRAL]
        - name: min_confidence
          in: query
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: status
          in: query
          schema:
            type: string
            enum: [active, executed, expired, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TradingSignal'
    
    post:
      tags:
        - 信号
      summary: 手动生成信号
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateSignalRequest'
      responses:
        '201':
          description: 信号生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingSignal'

  /signals/{signal_id}:
    get:
      tags:
        - 信号
      summary: 获取信号详情
      security:
        - BearerAuth: []
      parameters:
        - name: signal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradingSignal'
    
    delete:
      tags:
        - 信号
      summary: 取消信号
      security:
        - BearerAuth: []
      parameters:
        - name: signal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 取消成功

  /signals/{signal_id}/execute:
    post:
      tags:
        - 信号
      summary: 执行信号
      security:
        - BearerAuth: []
      parameters:
        - name: signal_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteSignalRequest'
      responses:
        '200':
          description: 执行成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResult'

  # ==================== 交易端点 ====================
  /trades:
    get:
      tags:
        - 交易
      summary: 获取交易记录列表
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, cancelled]
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Trade'

  /trades/{trade_id}:
    get:
      tags:
        - 交易
      summary: 获取交易详情
      security:
        - BearerAuth: []
      parameters:
        - name: trade_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trade'

  /trades/{trade_id}/close:
    post:
      tags:
        - 交易
      summary: 平仓
      security:
        - BearerAuth: []
      parameters:
        - name: trade_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClosePositionRequest'
      responses:
        '200':
          description: 平仓成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trade'

  /orders:
    post:
      tags:
        - 交易
      summary: 创建订单
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: 订单创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    
    get:
      tags:
        - 交易
      summary: 获取订单列表
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: symbol
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, filled, cancelled, rejected]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{order_id}:
    get:
      tags:
        - 交易
      summary: 获取订单详情
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    
    delete:
      tags:
        - 交易
      summary: 取消订单
      security:
        - BearerAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 取消成功

  /positions:
    get:
      tags:
        - 交易
      summary: 获取当前仓位列表
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: symbol
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'

  /positions/{position_id}:
    get:
      tags:
        - 交易
      summary: 获取仓位详情
      security:
        - BearerAuth: []
      parameters:
        - name: position_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Position'

  # ==================== 风控端点 ====================
  /risk/metrics:
    get:
      tags:
        - 风控
      summary: 获取风险指标
      security:
        - BearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskMetrics'

  /risk/limits:
    get:
      tags:
        - 风控
      summary: 获取风险限制配置
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskLimits'
    
    put:
      tags:
        - 风控
      summary: 更新风险限制配置
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiskLimits'
      responses:
        '200':
          description: 更新成功

  /risk/circuit-breaker:
    get:
      tags:
        - 风控
      summary: 获取熔断状态
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CircuitBreakerStatus'
    
    post:
      tags:
        - 风控
      summary: 手动触发熔断
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: 触发成功

  /risk/validate:
    post:
      tags:
        - 风控
      summary: 验证交易请求
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TradeRequest'
      responses:
        '200':
          description: 验证结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResult'

  # ==================== 监控端点 ====================
  /monitoring/dashboard:
    get:
      tags:
        - 监控
      summary: 获取监控仪表板数据
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardData'

  /monitoring/alerts:
    get:
      tags:
        - 监控
      summary: 获取预警列表
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, acknowledged, resolved]
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Alert'
    
    post:
      tags:
        - 监控
      summary: 创建预警
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '201':
          description: 创建成功

  /monitoring/alerts/{alert_id}/acknowledge:
    post:
      tags:
        - 监控
      summary: 确认预警
      security:
        - BearerAuth: []
      parameters:
        - name: alert_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 确认成功

  /monitoring/system-health:
    get:
      tags:
        - 监控
      summary: 获取系统健康状态
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemHealth'

  /monitoring/metrics:
    get:
      tags:
        - 监控
      summary: 获取系统指标
      security:
        - BearerAuth: []
      parameters:
        - name: service
          in: query
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemMetric'

  # ==================== 报告端点 ====================
  /reports/daily:
    get:
      tags:
        - 报告
      summary: 获取日报
      security:
        - BearerAuth: []
