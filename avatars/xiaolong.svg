<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dragonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)" stroke="#00d4ff" stroke-width="2"/>
  
  <!-- Tech Dragon - Simplified Geometric Design -->
  <g filter="url(#glow)" fill="none" stroke="url(#dragonGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Dragon Head -->
    <path d="M100 45 
             Q115 50 120 65 
             Q125 75 120 85
             Q115 95 100 90
             Q85 95 80 85
             Q75 75 80 65
             Q85 50 100 45Z"/>
    
    <!-- Eyes -->
    <circle cx="92" cy="68" r="4" fill="#00d4ff" stroke="none"/>
    <circle cx="108" cy="68" r="4" fill="#00d4ff" stroke="none"/>
    
    <!-- Tech Circuit Lines -->
    <path d="M100 90 L100 110" stroke-width="2"/>
    <path d="M100 110 L85 125" stroke-width="2"/>
    <path d="M100 110 L115 125" stroke-width="2"/>
    <path d="M85 125 L85 140" stroke-width="2"/>
    <path d="M115 125 L115 140" stroke-width="2"/>
    
    <!-- Body Segments -->
    <path d="M70 100 Q60 110 65 125" stroke-width="2"/>
    <path d="M130 100 Q140 110 135 125" stroke-width="2"/>
    
    <!-- Tech Nodes -->
    <circle cx="100" cy="110" r="3" fill="#00d4ff" stroke="none"/>
    <circle cx="85" cy="125" r="2.5" fill="#00d4ff" stroke="none"/>
    <circle cx="115" cy="125" r="2.5" fill="#00d4ff" stroke="none"/>
    <circle cx="85" cy="140" r="2" fill="#00d4ff" stroke="none"/>
    <circle cx="115" cy="140" r="2" fill="#00d4ff" stroke="none"/>
    
    <!-- Horns/Antennas -->
    <path d="M85 55 L80 40" stroke-width="2"/>
    <path d="M115 55 L120 40" stroke-width="2"/>
    <circle cx="80" cy="40" r="2" fill="#00d4ff" stroke="none"/>
    <circle cx="120" cy="40" r="2" fill="#00d4ff" stroke="none"/>
    
    <!-- Circuit Board Pattern -->
    <path d="M50 100 L35 100 L35 85 L50 85" stroke-width="1.5" opacity="0.6"/>
    <path d="M150 100 L165 100 L165 85 L150 85" stroke-width="1.5" opacity="0.6"/>
    <circle cx="35" cy="100" r="2" fill="#00d4ff" stroke="none" opacity="0.6"/>
    <circle cx="165" cy="100" r="2" fill="#00d4ff" stroke="none" opacity="0.6"/>
  </g>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="80" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Tech Text -->
  <text x="100" y="165" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="8" opacity="0.7">XIAO LONG v1.0</text>
</svg>